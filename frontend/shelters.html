<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Shelters - Crisis Supply Navigator</title>
  <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css">
  <link rel="stylesheet" href="css/style.css">
</head>
<body>
  <nav class="navbar navbar-expand-lg site-nav sticky-top">
    <div class="container-fluid">
      <a class="navbar-brand fw-semibold" href="index.html">Crisis Supply Navigator</a>
      <button class="navbar-toggler" type="button" data-bs-toggle="collapse" data-bs-target="#navbarNav">
        <span class="navbar-toggler-icon"></span>
      </button>
      <div class="collapse navbar-collapse" id="navbarNav">
        <ul class="navbar-nav ms-auto">
          <li class="nav-item"><a class="nav-link" href="dashboard.html">Dashboard</a></li>
          <li class="nav-item"><a class="nav-link" href="supplies.html">Supplies</a></li>
          <li class="nav-item"><a class="nav-link active" href="shelters.html">Shelters</a></li>
          <li class="nav-item"><a class="nav-link" href="deliveries.html">Deliveries</a></li>
          <li class="nav-item"><a class="nav-link" href="map.html">Map</a></li>
          <li class="nav-item"><a class="nav-link" href="admin.html">Admin</a></li>
        </ul>
      </div>
    </div>
  </nav>

  <main class="page-shell">
    <div class="container py-5">
      <div class="page-header">
        <div>
          <p class="eyebrow">Capacity tracking</p>
          <h1 class="page-title">Shelter management</h1>
        </div>
      </div>
      <div id="sheltersMessage" class="mb-3"></div>

      <div class="row g-4 mb-4">
        <div class="col-md-3">
          <article class="card metric-card h-100"><div class="card-body"><p class="metric-label">Total shelters</p><h2 class="metric-value" id="totalSheltersCount">0</h2><p class="metric-note">Active locations</p></div></article>
        </div>
        <div class="col-md-3">
          <article class="card metric-card h-100"><div class="card-body"><p class="metric-label">Total capacity</p><h2 class="metric-value" id="totalCapacityCount">0</h2><p class="metric-note">People</p></div></article>
        </div>
        <div class="col-md-3">
          <article class="card metric-card h-100 accent-card"><div class="card-body"><p class="metric-label">Current occupancy</p><h2 class="metric-value" id="currentOccupancyCount">0</h2><p class="metric-note" id="occupancyRateText">0% occupied</p></div></article>
        </div>
        <div class="col-md-3">
          <article class="card metric-card h-100 dark-card"><div class="card-body"><p class="metric-label">Available beds</p><h2 class="metric-value" id="availableBedsCount">0</h2><p class="metric-note">Remaining</p></div></article>
        </div>
      </div>

      <div class="row g-4" id="sheltersGrid"></div>
    </div>
  </main>

  <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/js/bootstrap.bundle.min.js"></script>
  <script src="js/app.js"></script>
</body>
</html>
