<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Map - Crisis Supply Navigator</title>
  <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css">
  <link rel="stylesheet" href="https://unpkg.com/leaflet@1.9.4/dist/leaflet.css">
  <link rel="stylesheet" href="css/style.css">
</head>
<body>
  <nav class="navbar navbar-expand-lg site-nav sticky-top">
    <div class="container-fluid">
      <a class="navbar-brand fw-semibold" href="index.html">Crisis Supply Navigator</a>
      <button class="navbar-toggler" type="button" data-bs-toggle="collapse" data-bs-target="#navbarNav">
        <span class="navbar-toggler-icon"></span>
      </button>
      <div class="collapse navbar-collapse" id="navbarNav">
        <ul class="navbar-nav ms-auto">
          <li class="nav-item"><a class="nav-link" href="dashboard.html">Dashboard</a></li>
          <li class="nav-item"><a class="nav-link" href="supplies.html">Supplies</a></li>
          <li class="nav-item"><a class="nav-link" href="shelters.html">Shelters</a></li>
          <li class="nav-item"><a class="nav-link" href="deliveries.html">Deliveries</a></li>
          <li class="nav-item"><a class="nav-link active" href="map.html">Map</a></li>
          <li class="nav-item"><a class="nav-link" href="admin.html">Admin</a></li>
        </ul>
      </div>
    </div>
  </nav>

  <main class="page-shell">
    <div class="container-fluid py-4 px-4">
      <div class="page-header">
        <div>
          <p class="eyebrow">Response geography</p>
          <h1 class="page-title">Live resource map</h1>
        </div>
      </div>
      <div id="mapMessage" class="mb-3"></div>
      <div class="row g-4">
        <div class="col-lg-8">
          <article class="card panel-card h-100">
            <div class="card-body">
              <div id="map" class="map-frame"></div>
            </div>
          </article>
        </div>
        <div class="col-lg-4">
          <article class="card panel-card mb-4">
            <div class="card-body">
              <p class="eyebrow">Legend</p>
              <h2 class="section-card-title">Location types</h2>
              <div class="legend-list">
                <div><span class="legend-swatch legend-dark"></span>Shelters and hospitals</div>
                <div><span class="legend-swatch legend-accent"></span>Supply points</div>
                <div><span class="legend-swatch legend-soft"></span>Limited capacity</div>
              </div>
            </div>
          </article>
          <article class="card panel-card">
            <div class="card-body">
              <p class="eyebrow">Closest points</p>
              <h2 class="section-card-title">Nearby locations</h2>
              <div class="list-group list-group-flush" id="nearbyLocationsList"></div>
            </div>
          </article>
        </div>
      </div>
    </div>
  </main>

  <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/js/bootstrap.bundle.min.js"></script>
  <script src="https://unpkg.com/leaflet@1.9.4/dist/leaflet.js"></script>
  <script src="js/app.js"></script>
</body>
</html>
