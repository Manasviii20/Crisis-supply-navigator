<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Supplies - Crisis Supply Navigator</title>
  <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css">
  <link rel="stylesheet" href="css/style.css">
</head>
<body>
  <nav class="navbar navbar-expand-lg site-nav sticky-top">
    <div class="container-fluid">
      <a class="navbar-brand fw-semibold" href="index.html">Crisis Supply Navigator</a>
      <button class="navbar-toggler" type="button" data-bs-toggle="collapse" data-bs-target="#navbarNav">
        <span class="navbar-toggler-icon"></span>
      </button>
      <div class="collapse navbar-collapse" id="navbarNav">
        <ul class="navbar-nav ms-auto">
          <li class="nav-item"><a class="nav-link" href="dashboard.html">Dashboard</a></li>
          <li class="nav-item"><a class="nav-link active" href="supplies.html">Supplies</a></li>
          <li class="nav-item"><a class="nav-link" href="shelters.html">Shelters</a></li>
          <li class="nav-item"><a class="nav-link" href="deliveries.html">Deliveries</a></li>
          <li class="nav-item"><a class="nav-link" href="map.html">Map</a></li>
          <li class="nav-item"><a class="nav-link" href="admin.html">Admin</a></li>
        </ul>
      </div>
    </div>
  </nav>

  <main class="page-shell">
    <div class="container py-5">
      <div class="page-header page-header-inline">
        <div>
          <p class="eyebrow">Inventory</p>
          <h1 class="page-title">Supply management</h1>
        </div>
        <button class="btn btn-primary" data-bs-toggle="modal" data-bs-target="#addSupplyModal">Add supply</button>
      </div>
      <div id="suppliesMessage" class="mb-3"></div>

      <div class="row g-4 mb-4">
        <div class="col-md-4">
          <article class="card metric-card h-100">
            <div class="card-body">
              <p class="metric-label">Food and water</p>
              <h2 class="metric-value" id="foodWaterUnits">0</h2>
              <p class="metric-note">Units</p>
            </div>
          </article>
        </div>
        <div class="col-md-4">
          <article class="card metric-card h-100 accent-card">
            <div class="card-body">
              <p class="metric-label">Clothing</p>
              <h2 class="metric-value" id="clothingUnits">0</h2>
              <p class="metric-note">Units</p>
            </div>
          </article>
        </div>
        <div class="col-md-4">
          <article class="card metric-card h-100 dark-card">
            <div class="card-body">
              <p class="metric-label">Medicine</p>
              <h2 class="metric-value" id="medicineUnits">0</h2>
              <p class="metric-note">Units</p>
            </div>
          </article>
        </div>
      </div>

      <article class="card panel-card">
        <div class="card-body">
          <div class="panel-header">
            <p class="eyebrow">Current inventory</p>
            <h2 class="section-card-title">Live stock table</h2>
          </div>
          <div class="table-responsive">
            <table class="table align-middle">
              <thead>
                <tr>
                  <th>ID</th>
                  <th>Type</th>
                  <th>Category</th>
                  <th>Quantity</th>
                  <th>Location</th>
                  <th>Status</th>
                  <th>Mode</th>
                </tr>
              </thead>
              <tbody id="suppliesTableBody"></tbody>
            </table>
          </div>
        </div>
      </article>
    </div>
  </main>

  <div class="modal fade" id="addSupplyModal" tabindex="-1">
    <div class="modal-dialog">
      <div class="modal-content">
        <div class="modal-header">
          <h2 class="modal-title fs-5">Add supply</h2>
          <button type="button" class="btn-close" data-bs-dismiss="modal"></button>
        </div>
        <div class="modal-body">
          <form id="addSupplyForm">
            <div id="supplyFormMessage" class="mb-3"></div>
            <div class="mb-3">
              <label class="form-label">Supply type</label>
              <input type="text" class="form-control" name="type" required>
            </div>
            <div class="mb-3">
              <label class="form-label">Category</label>
              <select class="form-select" name="category">
                <option>Food</option>
                <option>Water</option>
                <option>Clothing</option>
                <option>Medicine</option>
                <option>Other</option>
              </select>
            </div>
            <div class="mb-3">
              <label class="form-label">Quantity</label>
              <input type="number" class="form-control" name="quantity" min="1" required>
            </div>
            <div class="mb-3">
              <label class="form-label">Storage location</label>
              <input type="text" class="form-control" name="location" required>
            </div>
            <div class="mb-0">
              <label class="form-label">Status</label>
              <select class="form-select" name="status">
                <option>Available</option>
                <option>Low Stock</option>
                <option>In Transit</option>
              </select>
            </div>
          </form>
        </div>
        <div class="modal-footer">
          <button type="button" class="btn btn-outline-dark" data-bs-dismiss="modal">Close</button>
          <button type="submit" form="addSupplyForm" class="btn btn-primary">Save</button>
        </div>
      </div>
    </div>
  </div>

  <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/js/bootstrap.bundle.min.js"></script>
  <script src="js/app.js"></script>
</body>
</html>
